<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Un-Doomed</title>
  </head>
  <body>
    <main class="panel">
      <!-- Brand header: minimal mark + name + tagline -->
      <header class="brand">
        <div class="brand__mark" aria-hidden="true"><svg width="34" height="34" viewBox="0 0 100 100" fill="none" aria-hidden="true"><path d="M37 16 H50 C73 16 84 31 84 50 C84 69 73 84 50 84 H37 Q28 84 28 75 V25 Q28 16 37 16 Z" style="stroke:var(--accent)" stroke-width="8" stroke-linejoin="round"/><path d="M45 27 H58" style="stroke:var(--accent)" stroke-width="5.5" stroke-linecap="round"/><circle cx="50.5" cy="71.5" r="4" style="fill:var(--accent)"/><path d="M13 31 L91 80" style="stroke:var(--bg)" stroke-width="18" stroke-linecap="round"/><path d="M13 31 L91 80" style="stroke:var(--accent)" stroke-width="8" stroke-linecap="round"/></svg></div>
        <div class="brand__text">
          <h1 class="brand__name">Un-Doomed</h1>
          <p class="brand__tagline">Hints, not answers.</p>
        </div>
      </header>

      <!-- The single primary action -->
      <button id="review-btn" class="btn" type="button">
        Request Socratic Review
      </button>

      <!-- Live status / error line -->
      <p id="status" class="status" role="status" aria-live="polite"></p>

      <!-- Where results appear -->
      <p class="hint">
        Results open in a panel on the page. Tip: you can also start a review
        with the floating <strong>Review</strong> button there.
      </p>

      <!-- Footer: settings link + the current problem -->
      <footer class="foot">
        <button id="open-settings" class="foot__link" type="button">
          &#9881; Settings
        </button>
        <span id="thread" class="foot__thread"></span>
      </footer>
    </main>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
