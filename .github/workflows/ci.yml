name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the package (and dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Byte-compile all modules
        run: python -m compileall src smoke_test.py

      - name: Start the backend and run the smoke test
        # LLM_PROVIDER=fake uses the built-in offline provider — no API key or
        # network needed, so the smoke test is deterministic and free in CI.
        env:
          LLM_PROVIDER: fake
        run: |
          undoom serve --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!

          echo "Waiting for the server to become healthy..."
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8000/health > /dev/null; then
              echo "Server is up."
              break
            fi
            sleep 1
          done

          python smoke_test.py
          STATUS=$?

          kill "$SERVER_PID" 2>/dev/null || true
          exit $STATUS
